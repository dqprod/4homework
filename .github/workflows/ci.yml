name: CI — 前端编译检查

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/**"
  pull_request:
    branches: [main]
    paths:
      - "frontend/**"

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: 安装依赖
        run: npm ci

      - name: TypeScript 类型检查
        run: npx tsc --noEmit
        continue-on-error: true

      - name: 编译（Next.js build）
        run: npm run build
